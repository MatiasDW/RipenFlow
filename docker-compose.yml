services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ripenflow-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/ripenflow
    ports:
      - '127.0.0.1:5173:5173'
    volumes:
      - .:/app
      - bun_modules:/app/node_modules
    command: sh -c "bun install && bun run dev"

  db:
    image: postgres:16-alpine
    container_name: ripenflow-db
    environment:
      POSTGRES_DB: ripenflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ripenflow']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bun_modules:
  postgres_data:
